<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Quản lý sinh viên</title>
    <style>
      .form-group {
        margin-bottom: 15px;
        position: relative;
        width: 300px;
      }
      label {
        font-weight: bold;
        display: block;
        margin-bottom: 5px;
      }
      input[type="text"],
      input[type="email"],
      input[type="password"] {
        width: 100%;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      .error-msg {
        color: #e74c3c;
        font-size: 12px;
        margin-top: 4px;
        display: none;
      }
      input.invalid {
        border-color: #e74c3c;
        background-color: #fdf2f2;
      }
      input.valid {
        border-color: #2ecc71;
      }
      button {
        padding: 10px 20px;
        background: #3498db;
        color: white;
        border: none;
        cursor: pointer;
      }
      #success-msg {
        display: none;
        padding: 20px;
        background: #d4edda;
        color: #155724;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <div id="registration-container">
      <h2>Đăng ký tài khoản</h2>
      <form id="registerForm">
        <div class="form-group">
          <label for="fullname">Họ và tên</label>
          <input type="text" id="fullname" placeholder="Nhập ít nhất 3 ký tự" />
          <span class="error-msg" id="err-fullname"></span>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="name@domain.com" />
          <span class="error-msg" id="err-email"></span>
        </div>

        <div class="form-group">
          <label for="phone">Số điện thoại</label>
          <input type="text" id="phone" placeholder="0xxxxxxxxx" />
          <span class="error-msg" id="err-phone"></span>
        </div>

        <div class="form-group">
          <label for="password">Mật khẩu</label>
          <input type="password" id="password" />
          <span class="error-msg" id="err-password"></span>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Xác nhận mật khẩu</label>
          <input type="password" id="confirmPassword" />
          <span class="error-msg" id="err-confirmPassword"></span>
        </div>

        <div class="form-group">
          <label>Giới tính:</label>
          <input type="radio" name="gender" value="Nam" /> Nam
          <input type="radio" name="gender" value="Nữ" /> Nữ
          <span class="error-msg" id="err-gender"></span>
        </div>

        <div class="form-group">
          <input type="checkbox" id="terms" /> Tôi đồng ý với điều khoản
          <span class="error-msg" id="err-terms"></span>
        </div>

        <button type="submit">Đăng ký ngay</button>
      </form>
    </div>

    <div id="success-msg">
      <h3>Đăng ký thành công! 🎉</h3>
      <p>Chào mừng <span id="user-display"></span> đã gia nhập hệ thống.</p>
    </div>

    <script src="BT2.1.js"></script>
  </body>
</html>
