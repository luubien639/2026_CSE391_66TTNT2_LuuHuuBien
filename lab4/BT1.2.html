<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Quản lý sinh viên</title>
    <style>
      .weak-student {
        background-color: #fff9c4;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
      }
      th,
      td {
        border: 1px solid #ddd;
        padding: 8px;
        text-align: center;
      }
      th {
        background-color: #f2f2f2;
        cursor: pointer;
        user-select: none;
      }
      .controls {
        margin: 20px 0;
        display: flex;
        gap: 10px;
      }
      #emptyMsg {
        display: none;
        text-align: center;
        color: red;
        padding: 20px;
      }
    </style>
  </head>
  <body>
    <h2>Quản lý điểm sinh viên</h2>

    <div>
      <input type="text" id="fullname" placeholder="Họ tên" />
      <input type="number" id="score" placeholder="Điểm" step="0.1" />
      <button id="btnAdd">Thêm sinh viên</button>
    </div>

    <div class="controls">
      <input type="text" id="searchInput" placeholder="Tìm kiếm tên..." />
      <select id="filterRank">
        <option value="Tất cả">Tất cả xếp loại</option>
        <option value="Giỏi">Giỏi</option>
        <option value="Khá">Khá</option>
        <option value="Trung bình">Trung bình</option>
        <option value="Yếu">Yếu</option>
      </select>
    </div>

    <table>
      <thead>
        <tr>
          <th>STT</th>
          <th>Họ tên</th>
          <th id="sortScore">Điểm <span id="sortIcon">▼</span></th>
          <th>Xếp loại</th>
          <th>Thao tác</th>
        </tr>
      </thead>
      <tbody id="studentTableBody"></tbody>
    </table>
    <div class="stats" style="margin-top: 15px; font-weight: bold">
      Tổng số SV : <span id="totalStudents">0</span> | Điểm TB:
      <span id="avgScore">0</span>
    </div>
    <div id="emptyMsg">Không có kết quả tìm thấy.</div>

    <script src="BT1.2.js"></script>
  </body>
</html>
